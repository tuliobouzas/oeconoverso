{{ define "main" }}
<div class="info">
    <h1 style="text-align: center; margin-bottom: 3rem;">{{ .Title }}</h1>
    
    {{ .Content }}

    <div style="margin-top: 3rem;">
        {{ range .Pages }}
        <article style="margin-bottom: 4rem; border-bottom: 1px solid var(--theme-color); padding-bottom: 2rem;">
            <div style="text-transform: uppercase; color: var(--theme-color-dark); font-size: 12px; letter-spacing: 1px; margin-bottom: 5px;">
                {{ .Date.Format "02 de Janeiro de 2006" }}
            </div>
            <h2 style="margin-top: 0;">
                <a href="{{ .RelPermalink }}" style="text-decoration: none; color: var(--body-color); font-weight: bold;">{{ .Title }}</a>
            </h2>
            
            {{ if .Params.image }}
            <a href="{{ .RelPermalink }}">
                <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; height: auto; border-radius: 8px; margin-bottom: 1.5rem;">
            </a>
            {{ end }}

            <div style="margin-bottom: 1.5rem;">
                {{ .Summary }}
            </div>
            
            <a href="{{ .RelPermalink }}" class="read-more-btn">Leia o artigo completo</a>
        </article>
        {{ end }}
    </div>
</div>
{{ end }}
