<script>document.documentElement.classList.add('js');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ .Title }}</title>

<!-- Page icon -->
<link rel="icon" type="image/png" href="{{ "icons/icon.webp" | absURL }}" />

<!-- Metadata -->
<meta name="description" content="{{ .Params.description }}">
<link rel="canonical" href="{{ .Permalink }}" />
<meta name="language" content="en" />

<!-- Metadata for social media -->
<meta property="og:title" content="{{ .Title }}" />
<meta property="og:description" content="{{ .Params.description }}">
<meta property="og:type" content="website" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ "img/preview.webp" | absURL }}">

<!-- Twitter Card metadata -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ .Title }}" />
<meta name="twitter:description" content="{{.Params.description }}" />
<meta name="twitter:image" content="{{ "img/preview.webp" | absURL }}" />

<!-- Script for the toggle menu -->
<script src="{{ "js/toggle-menu.js" | absURL }}" ></script>
<!-- Script for theme toggle -->
<script src="{{ "js/theme-toggle.js" | absURL }}" ></script>
<!-- Utilities Script -->
<script src="{{ "js/utils.js" | absURL }}" defer></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bigelow+Rules&family=Manufacturing+Consent&family=Monoton&family=Six+Caps&family=Smythe&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ "css/base.css" | absURL }}">
<link rel="stylesheet" href="{{ "css/layout.css" | absURL }}">
<link rel="stylesheet" href="{{ "css/components.css" | absURL }}">
<link rel="stylesheet" href="{{ "css/menubar.css" | absURL }}">
<link rel="stylesheet" href="{{ "css/variables.css" | absURL }}">

<!-- Markdown Stylesheet -->
<link rel="stylesheet" href="{{ "css/markdown.css" | absURL }}">
